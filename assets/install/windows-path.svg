<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="420" viewBox="0 0 1100 420" role="img" aria-labelledby="title desc">
  <title id="title">Windows Miniconda path and PATH advice</title>
  <desc id="desc">Good and bad Windows installation paths, and a reminder to prefer Anaconda Prompt instead of manually editing PATH.</desc>
  <rect width="1100" height="420" fill="#fbfcfe"/>
  <text x="550" y="44" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#172033">Windows 安装路径和环境变量</text>
  <text x="550" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#52616f">Miniconda 路径越简单，后面遇到兼容性问题的概率越低。</text>

  <g font-family="Arial, sans-serif">
    <rect x="70" y="115" width="455" height="220" rx="14" fill="#ecfdf3" stroke="#26a269" stroke-width="3"/>
    <text x="298" y="153" text-anchor="middle" font-size="24" font-weight="700" fill="#136c43">推荐</text>
    <text x="112" y="194" font-size="18" fill="#172033">路径短，没有空格和特殊字符：</text>
    <rect x="112" y="215" width="366" height="34" rx="6" fill="#ffffff" stroke="#8fd8ad"/>
    <text x="130" y="238" font-size="16" fill="#172033">C:\Users\Alice\miniconda3</text>
    <rect x="112" y="260" width="366" height="34" rx="6" fill="#ffffff" stroke="#8fd8ad"/>
    <text x="130" y="283" font-size="16" fill="#172033">D:\miniconda3</text>
    <text x="112" y="319" font-size="16" fill="#136c43">安装选项：Just Me，本地用户安装。</text>

    <rect x="575" y="115" width="455" height="220" rx="14" fill="#fff4f0" stroke="#d73a31" stroke-width="3"/>
    <text x="803" y="153" text-anchor="middle" font-size="24" font-weight="700" fill="#9c1c13">避免</text>
    <text x="617" y="194" font-size="18" fill="#172033">包含空格、中文或系统目录：</text>
    <rect x="617" y="215" width="366" height="34" rx="6" fill="#ffffff" stroke="#efaaa3"/>
    <text x="635" y="238" font-size="16" fill="#172033">C:\Program Files\Miniconda3</text>
    <rect x="617" y="260" width="366" height="34" rx="6" fill="#ffffff" stroke="#efaaa3"/>
    <text x="635" y="283" font-size="16" fill="#172033">C:\Users\Alice Wang\miniconda3</text>
    <text x="617" y="319" font-size="16" fill="#9c1c13">不要随手把多个 Python 都塞进系统 PATH。</text>

    <rect x="188" y="355" width="725" height="42" rx="9" fill="#eef4ff" stroke="#9ab7e6"/>
    <text x="550" y="382" text-anchor="middle" font-size="17" fill="#172033">初学者优先使用 Anaconda Prompt；普通终端找不到 conda 时，再考虑 conda init。</text>
  </g>
</svg>
