<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520" role="img" aria-labelledby="title desc">
  <title id="title">VS Code notebook kernel selection</title>
  <desc id="desc">A simplified VS Code notebook screen showing where to choose the Python biostat kernel.</desc>
  <rect width="1100" height="520" fill="#f7f9fc"/>
  <text x="550" y="43" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#172033">VS Code 中选择 Notebook 内核</text>
  <text x="550" y="73" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#52616f">Notebook 运行失败时，首先确认右上角内核不是系统 Python，而是课程环境。</text>

  <g font-family="Arial, sans-serif">
    <rect x="90" y="105" width="920" height="350" rx="16" fill="#ffffff" stroke="#b9c6d6" stroke-width="2"/>
    <rect x="90" y="105" width="920" height="48" rx="16" fill="#1f2937"/>
    <rect x="90" y="133" width="920" height="20" fill="#1f2937"/>
    <circle cx="122" cy="129" r="7" fill="#ef4444"/>
    <circle cx="146" cy="129" r="7" fill="#f59e0b"/>
    <circle cx="170" cy="129" r="7" fill="#22c55e"/>
    <text x="210" y="136" font-size="16" fill="#dbeafe">dl_intro/03_logistic_regression_mnist_pytorch.ipynb</text>

    <rect x="118" y="175" width="170" height="250" fill="#f2f5f9" stroke="#d8e0ea"/>
    <text x="138" y="207" font-size="15" font-weight="700" fill="#172033">Explorer</text>
    <text x="138" y="242" font-size="14" fill="#52616f">README.md</text>
    <text x="138" y="270" font-size="14" fill="#52616f">install.md</text>
    <text x="138" y="298" font-size="14" fill="#172033">dl_intro/</text>
    <text x="158" y="326" font-size="14" fill="#52616f">02_softmax...</text>
    <text x="158" y="354" font-size="14" fill="#52616f">03_logistic...</text>

    <rect x="316" y="176" width="650" height="250" rx="10" fill="#ffffff" stroke="#d8e0ea"/>
    <text x="344" y="214" font-size="20" font-weight="700" fill="#172033">Logistic Regression on MNIST</text>
    <rect x="760" y="188" width="176" height="34" rx="7" fill="#eef4ff" stroke="#2b7de9" stroke-width="2"/>
    <text x="848" y="211" text-anchor="middle" font-size="15" font-weight="700" fill="#1455b8">Python (biostat)</text>
    <path d="M955 205 L1006 205" stroke="#d9822b" stroke-width="4" marker-end="url(#arrow)"/>
    <text x="1016" y="210" font-size="15" fill="#d9822b">右上角</text>

    <rect x="345" y="246" width="560" height="70" rx="8" fill="#f8fafc" stroke="#d8e0ea"/>
    <text x="366" y="273" font-size="15" fill="#172033">import torch</text>
    <text x="366" y="299" font-size="15" fill="#172033">print(torch.__version__)</text>
    <circle cx="338" cy="281" r="12" fill="#26a269"/>
    <path d="M334 274 L347 281 L334 288 Z" fill="#ffffff"/>

    <rect x="345" y="338" width="560" height="52" rx="8" fill="#f2f7ff" stroke="#b4c7e7"/>
    <text x="366" y="370" font-size="15" fill="#172033">输出会显示在当前 cell 下方。</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#d9822b"/>
    </marker>
  </defs>
</svg>
