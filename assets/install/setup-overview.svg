<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="360" viewBox="0 0 1100 360" role="img" aria-labelledby="title desc">
  <title id="title">Miniconda and VS Code setup overview</title>
  <desc id="desc">A four step setup flow: install VS Code, install Miniconda, create a course environment, select the Jupyter kernel.</desc>
  <rect width="1100" height="360" fill="#f7f9fc"/>
  <text x="550" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#172033">安装路线图</text>
  <text x="550" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#52616f">目标：让 VS Code 使用独立的 conda 环境来运行课程 notebook</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#62748a"/>
    </marker>
  </defs>

  <g font-family="Arial, sans-serif">
    <rect x="55" y="125" width="215" height="130" rx="12" fill="#ffffff" stroke="#2b7de9" stroke-width="3"/>
    <circle cx="88" cy="158" r="18" fill="#2b7de9"/>
    <text x="88" y="164" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">1</text>
    <text x="160" y="158" text-anchor="middle" font-size="21" font-weight="700" fill="#172033">安装 VS Code</text>
    <text x="160" y="193" text-anchor="middle" font-size="15" fill="#52616f">编辑代码和 notebook</text>
    <text x="160" y="219" text-anchor="middle" font-size="15" fill="#52616f">安装 Python 与 Jupyter 插件</text>

    <rect x="320" y="125" width="215" height="130" rx="12" fill="#ffffff" stroke="#26a269" stroke-width="3"/>
    <circle cx="353" cy="158" r="18" fill="#26a269"/>
    <text x="353" y="164" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">2</text>
    <text x="428" y="158" text-anchor="middle" font-size="21" font-weight="700" fill="#172033">安装 Miniconda</text>
    <text x="428" y="193" text-anchor="middle" font-size="15" fill="#52616f">管理 Python 版本和包</text>
    <text x="428" y="219" text-anchor="middle" font-size="15" fill="#52616f">避免污染系统 Python</text>

    <rect x="585" y="125" width="215" height="130" rx="12" fill="#ffffff" stroke="#d9822b" stroke-width="3"/>
    <circle cx="618" cy="158" r="18" fill="#d9822b"/>
    <text x="618" y="164" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">3</text>
    <text x="692" y="158" text-anchor="middle" font-size="21" font-weight="700" fill="#172033">创建课程环境</text>
    <text x="692" y="193" text-anchor="middle" font-size="15" fill="#52616f">conda create -n biostat</text>
    <text x="692" y="219" text-anchor="middle" font-size="15" fill="#52616f">安装 torch, sklearn 等包</text>

    <rect x="850" y="125" width="215" height="130" rx="12" fill="#ffffff" stroke="#7b61ff" stroke-width="3"/>
    <circle cx="883" cy="158" r="18" fill="#7b61ff"/>
    <text x="883" y="164" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">4</text>
    <text x="958" y="158" text-anchor="middle" font-size="21" font-weight="700" fill="#172033">选择 Notebook 内核</text>
    <text x="958" y="193" text-anchor="middle" font-size="15" fill="#52616f">Select Kernel</text>
    <text x="958" y="219" text-anchor="middle" font-size="15" fill="#52616f">Python (biostat)</text>

    <line x1="282" y1="190" x2="306" y2="190" stroke="#62748a" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="547" y1="190" x2="571" y2="190" stroke="#62748a" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="812" y1="190" x2="836" y2="190" stroke="#62748a" stroke-width="3" marker-end="url(#arrow)"/>
  </g>

  <text x="550" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#52616f">安装一次即可。之后每次上课通常只需要：打开 VS Code，打开 notebook，确认内核是 Python (biostat)。</text>
</svg>
